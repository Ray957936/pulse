<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f7fafb">
<title>Pulse</title>
<link rel="manifest" href="/pulse/manifest.json">
<link rel="apple-touch-icon" href="/pulse/icons/icon-192.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7fafb;--surface:#ffffff;--surface2:#f1f4f5;--surface3:#e5e9ea;
  --primary:#2f6378;--primary-container:#4a7c92;--on-primary:#ffffff;
  --secondary:#266864;--secondary-container:#abece6;--on-secondary:#ffffff;
  --text:#181c1d;--text2:#41484c;--text3:#71787c;
  --outline:#c0c7cc;--outline2:#d7dadb;--error:#ba1a1a;
  --radius:12px;--radius-sm:8px;--radius-pill:9999px;
  --shadow:0 4px 20px rgba(0,0,0,.04);
  --safe-bottom:env(safe-area-inset-bottom,16px);
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;user-select:none}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}
/* Lock */
#lock{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:32px}
#lock.hidden{display:none}
#lock-hero{display:flex;flex-direction:column;align-items:center;gap:12px}
#lock-icon{width:64px;height:64px;border-radius:50%;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:28px;border:1px solid var(--outline)}
#lock-title{font-size:22px;font-weight:600;letter-spacing:-.02em}
#lock-subtitle{font-size:14px;color:var(--text2)}
.passcode-dots{display:flex;gap:16px}
.passcode-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--outline);background:transparent;transition:all .2s}
.passcode-dot.filled{background:var(--primary);border-color:var(--primary)}
.passcode-dot.error{background:var(--error);border-color:var(--error);animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.passcode-pad{display:grid;grid-template-columns:repeat(3,64px);gap:16px 24px;justify-content:center}
.passcode-key{width:64px;height:64px;border-radius:50%;border:1px solid var(--outline);background:var(--surface);color:var(--text);font-size:22px;font-weight:500;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.passcode-key:active{background:var(--primary);color:var(--on-primary);border-color:var(--primary)}
.passcode-key.del{font-size:16px;color:var(--text3);border:none;background:none}
#lock-info{font-size:13px;color:var(--text2);margin-bottom:8px;font-weight:500}
/* Interception Overlay */
#interception{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:90;padding:20px;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
#interception.hidden{display:none}
.interception-card{background:var(--surface);border-radius:var(--radius);padding:24px 20px;width:100%;max-width:340px;box-shadow:0 8px 32px rgba(0,0,0,.12);text-align:center;display:flex;flex-direction:column;gap:16px;animation:popIn .3s ease}
@keyframes popIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.interception-card .int-icon{font-size:40px}
.interception-card .int-stats{font-size:14px;color:var(--text2);line-height:1.5}
.interception-card .int-stats strong{color:var(--primary);font-size:16px}
.interception-card .int-msg{font-size:15px;color:var(--text);font-weight:500;line-height:1.5}
.interception-card .int-alt{background:var(--secondary-container);border-radius:var(--radius-sm);padding:12px 16px;font-size:13px;color:var(--secondary);line-height:1.6;text-align:left}
.interception-card .int-alt .alt-label{font-size:11px;font-weight:600;margin-bottom:6px;opacity:.7;text-transform:uppercase;letter-spacing:.05em}
.interception-card .int-alt li{margin:3px 0;list-style:'▸ ';padding-left:4px}
.int-btns{display:flex;gap:10px}
.int-btns button{flex:1;padding:12px;border-radius:var(--radius-sm);border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.int-btns .int-proceed{background:var(--surface);color:var(--text);border:1px solid var(--outline)}
.int-btns .int-proceed:active{background:var(--surface2)}
.int-btns .int-resist{background:var(--secondary);color:var(--on-secondary)}
.int-btns .int-resist:active{background:#1d524f}
/* Header */
#header{display:flex;justify-content:space-between;align-items:center;padding:12px 20px 8px;background:var(--bg)}
#header h1{font-size:18px;font-weight:700;color:var(--primary-container);letter-spacing:-.02em}
#lock-btn{background:none;border:1px solid var(--outline);border-radius:50%;width:36px;height:36px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
#lock-btn:active{background:var(--surface3)}
/* Risk Warning Bar */
#risk-bar{display:none;background:linear-gradient(135deg,rgba(186,26,26,.1),rgba(186,26,26,.06));border:1px solid rgba(186,26,26,.2);border-radius:var(--radius-sm);padding:10px 14px;margin:0 20px 8px;font-size:12px;color:var(--error);text-align:center;font-weight:500}
#risk-bar.visible{display:block}
/* Content */
#content{flex:1;overflow-y:auto;padding:0 20px 100px;-webkit-overflow-scrolling:touch}
#content::-webkit-scrollbar{width:0}
/* Bottom Nav - 6 items compact */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:1px solid var(--outline);display:flex;padding:4px 0 var(--safe-bottom);z-index:50;border-radius:16px 16px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.04)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px 1px;cursor:pointer;color:var(--text3);font-size:9px;font-weight:600;letter-spacing:.02em;text-transform:uppercase;transition:all .2s;white-space:nowrap}
.nav-item.active{color:var(--primary-container)}
.nav-item .nicon{font-size:20px}
/* Views */
.view{display:none}
.view.active{display:block}
/* Timer */
#timer-area{display:flex;flex-direction:column;align-items:center;padding:20px 0}
.timer-ring{position:relative;width:180px;height:180px;margin-bottom:16px}
.timer-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.timer-ring .bg{fill:none;stroke:var(--surface3);stroke-width:6}
.timer-ring .fg{fill:none;stroke:var(--primary);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .3s linear}
.timer-time{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.timer-time .elapsed{font-size:32px;font-weight:500;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
.timer-time .unit{font-size:12px;color:var(--text2);margin-top:2px}
#timer-btn{width:60px;height:60px;border-radius:50%;border:none;background:var(--primary);color:var(--on-primary);font-size:16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(47,99,120,.3)}
#timer-btn:active{transform:scale(.95)}
#timer-btn.running{background:var(--error);box-shadow:0 4px 12px rgba(186,26,26,.3)}
/* Cancel button */
#cancel-btn{display:none;margin-top:8px;background:none;border:1px solid var(--outline);color:var(--text3);font-size:12px;cursor:pointer;padding:6px 16px;border-radius:var(--radius-pill);transition:all .15s}
#cancel-btn:active{background:var(--surface3);border-color:var(--error);color:var(--error)}
#cancel-btn.visible{display:inline-block}
/* Edit indicator */
#edit-indicator{display:none;text-align:center;font-size:13px;color:var(--secondary);margin-bottom:8px;font-weight:600}
#edit-cancel-btn{display:none;margin-top:8px}
#edit-cancel-btn.visible{display:block}
/* Trigger Tip on Record page */
.trigger-tip{display:none;background:var(--secondary-container);border:1px solid var(--secondary);border-radius:var(--radius-sm);padding:14px;margin-top:12px;font-size:13px;color:var(--secondary);line-height:1.6}
.trigger-tip.visible{display:block}
.trigger-tip .tt-label{font-size:11px;font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;opacity:.7}
.trigger-tip .tt-alt{margin-top:8px;padding-top:8px;border-top:1px solid rgba(38,104,100,.2)}
.trigger-tip .tt-alt ul{margin:4px 0 0;padding-left:16px}
.trigger-tip .tt-alt li{margin:2px 0;font-size:13px}
.trigger-tip .tt-resist{display:inline-block;margin-top:10px;background:var(--secondary);color:var(--on-secondary);border:none;padding:8px 18px;border-radius:var(--radius-pill);font-size:13px;font-weight:600;cursor:pointer}
.trigger-tip .tt-resist:active{opacity:.8}
/* Cards */
.card{background:var(--surface);border:1px solid var(--outline);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
/* Quick Stats */
#streak-bar{display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,rgba(38,104,100,.1),rgba(47,99,120,.08));border:1px solid var(--secondary-container);border-radius:var(--radius);padding:12px;margin:12px 0;font-size:14px;font-weight:500;color:var(--secondary)}
#streak-bar .icon{font-size:20px}
#streak-bar.hidden{display:none}
#quick-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0}
.qs-card{background:var(--surface);border:1px solid var(--outline);border-radius:var(--radius);padding:14px;text-align:center;box-shadow:var(--shadow)}
.qs-card .val{font-size:28px;font-weight:500;color:var(--primary);letter-spacing:-.02em}
.qs-card .label{font-size:10px;font-weight:600;color:var(--text2);margin-top:4px;letter-spacing:.05em;text-transform:uppercase}
/* Section */
.section-title{font-size:13px;font-weight:600;color:var(--text2);margin:24px 0 12px;text-transform:uppercase;letter-spacing:.05em}
/* Sessions */
.session-item{background:var(--surface);border:1px solid var(--outline);border-radius:var(--radius-sm);padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.si-left{display:flex;flex-direction:column;gap:2px;overflow:hidden}
.si-date{font-size:13px;color:var(--text2)}
.si-info{font-size:14px;font-weight:500}
.si-dur{font-size:20px;font-weight:300;color:var(--primary)}
/* Form */
.form-group{margin-bottom:16px}
.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;display:block;letter-spacing:.05em;text-transform:uppercase}
input[type="text"],input[type="number"],textarea{width:100%;background:var(--surface);border:1px solid var(--outline);border-radius:var(--radius-sm);padding:12px;color:var(--text);font-size:14px;outline:none;transition:border .2s}
input:focus,textarea:focus{border-color:var(--primary)}
textarea{resize:none;height:80px}
.dur-display{font-size:40px;font-weight:500;color:var(--primary);text-align:center;padding:20px;letter-spacing:-.03em}
/* Chips */
.chip-row{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:8px 16px;border-radius:var(--radius-pill);border:1px solid var(--outline);background:var(--surface);color:var(--text2);font-size:13px;cursor:pointer;transition:all .2s}
.chip.selected{border-color:var(--secondary);background:var(--secondary-container);color:var(--secondary)}
.chip:active{transform:scale(.96)}
/* Rating */
.rating-row{display:flex;gap:12px;justify-content:center}
.rating-dot{width:44px;height:44px;border-radius:50%;border:2px solid var(--outline);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:all .2s}
.rating-dot.selected{border-color:var(--primary);background:var(--primary);color:var(--on-primary)}
/* Calendar */
#calendar{display:flex;flex-direction:column;gap:2px;overflow-x:auto;padding:8px 0}
.cal-row{display:flex;gap:2px;align-items:center}
.cal-label{width:28px;font-size:9px;color:var(--text2);text-align:right;padding-right:4px;font-weight:600}
.cal-day{width:13px;height:13px;border-radius:2px;background:var(--surface3);cursor:pointer;transition:all .15s}
.cal-day[data-level="1"]{background:rgba(47,99,120,.3)}
.cal-day[data-level="2"]{background:rgba(47,99,120,.6)}
.cal-day[data-level="3"]{background:var(--primary)}
.cal-day[data-checkin="1"]{box-shadow:inset 0 0 0 1.5px var(--secondary)}
.cal-month-labels{display:flex;gap:2px;padding-left:32px;margin-bottom:4px;font-size:9px;color:var(--text3)}
.cal-month-labels span{width:15px;text-align:center}
/* Chart */
#chart-container{background:var(--surface);border:1px solid var(--outline);border-radius:var(--radius);padding:16px;margin:12px 0;height:200px}
#correlation-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0}
.corr-card{background:var(--surface);border:1px solid var(--outline);border-radius:var(--radius-sm);padding:12px;text-align:center}
.corr-card .title{font-size:11px;color:var(--text2)}
.corr-card .value{font-size:18px;font-weight:600;margin-top:4px}
.corr-card .insight{font-size:11px;margin-top:4px}
/* Goals */
.goal-item{background:var(--surface);border:1px solid var(--outline);border-radius:var(--radius);padding:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.gi-label{font-size:14px;color:var(--text2)}
.gi-val{font-size:24px;font-weight:500;display:flex;align-items:center;gap:12px}
.gi-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--outline);background:var(--surface);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.gi-btn:active{background:var(--primary);color:var(--on-primary)}
.goal-warn{background:rgba(186,26,26,.08);border:1px solid var(--error);border-radius:var(--radius-sm);padding:12px;margin-top:8px;font-size:13px;color:var(--error)}
/* Buttons */
.btn{padding:12px 20px;border-radius:var(--radius-sm);border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;width:100%;text-align:center}
.btn-primary{background:var(--primary);color:var(--on-primary);min-height:48px;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-primary:active{background:var(--primary-container)}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--outline)}
.btn-secondary:active{background:var(--surface2)}
.btn-danger{background:var(--error);color:#fff;font-size:13px;padding:8px 16px;width:auto}
.del-icon{width:28px;height:28px;border-radius:50%;border:1px solid var(--outline);background:none;color:var(--text3);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;margin-left:8px}.del-icon:active{background:var(--error);color:#fff;border-color:var(--error)}
/* History filter bar */
.filter-bar{background:var(--surface);border:1px solid var(--outline);border-radius:var(--radius);padding:12px;margin-bottom:12px;box-shadow:var(--shadow)}
.filter-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.filter-row:last-child, .filter-row.nc{margin-bottom:0}
.filter-row input[type="text"],.filter-row input[type="date"]{flex:1;padding:8px 10px;font-size:13px;border-radius:var(--radius-sm)}
.filter-row input[type="date"]{min-width:0}
.hist-chip-row{display:flex;flex-wrap:wrap;gap:6px}
.hist-chip{padding:6px 12px;border-radius:var(--radius-pill);border:1px solid var(--outline);background:var(--surface);color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s}
.hist-chip.selected{border-color:var(--secondary);background:var(--secondary-container);color:var(--secondary)}
.hist-chip:active{transform:scale(.96)}
/* History item */
.hist-item{background:var(--surface);border:1px solid var(--outline);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-start;box-shadow:var(--shadow)}
.hist-item.hidden-item{opacity:.45}
.hist-item .hi-left{flex:1;min-width:0}
.hist-item .hi-date{font-size:12px;color:var(--text3)}
.hist-item .hi-info{font-size:14px;font-weight:500;margin:2px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-item .hi-triggers{font-size:12px;color:var(--text2)}
.hist-item .hi-notes{font-size:12px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-item .hi-actions{display:flex;gap:4px;flex-shrink:0;margin-left:8px}
.hi-action{width:30px;height:30px;border-radius:8px;border:1px solid var(--outline);background:var(--surface);color:var(--text3);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.hi-action:active{background:var(--primary);color:var(--on-primary);border-color:var(--primary)}
.hi-action.danger:active{background:var(--error);color:#fff;border-color:var(--error)}
/* Settings - intervention editor */
.intv-item{background:var(--surface);border:1px solid var(--outline);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px}
.intv-item .intv-trigger{font-size:13px;font-weight:600;margin-bottom:6px;color:var(--primary)}
.intv-item .intv-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.intv-item input{flex:1;font-size:12px;padding:8px 10px}
.intv-item .intv-alt-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.intv-item .intv-alt-tag{font-size:11px;padding:3px 10px;border-radius:var(--radius-pill);background:var(--secondary-container);color:var(--secondary);display:flex;align-items:center;gap:4px;cursor:default}
.intv-item .intv-alt-tag .rm{font-size:10px;cursor:pointer;opacity:.6}.intv-item .intv-alt-tag .rm:hover{opacity:1}
/* Toast */
#toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--primary);color:var(--on-primary);padding:10px 20px;border-radius:var(--radius-pill);font-size:13px;font-weight:600;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.15)}
#toast.show{opacity:1}
.empty{text-align:center;padding:32px;color:var(--text3);font-size:13px}
.toggle-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text);cursor:pointer}
.toggle-row input[type="checkbox"]{accent-color:var(--secondary);width:18px;height:18px}
@media(max-width:360px){.timer-ring{width:150px;height:150px}.timer-time .elapsed{font-size:26px}.nav-item{font-size:8px}.nav-item .nicon{font-size:18px}}
</style>
</head>
<body>
<div id="app">
  <div id="lock">
    <div id="lock-hero">
      <div id="lock-icon">🔒</div>
      <div id="lock-title">输入密码</div>
      <div id="lock-subtitle">数据本地加密，仅你可见</div>
    </div>
    <div id="lock-info">🔑 默认密码：0000</div>
    <div class="passcode-dots" id="dots"></div>
    <div class="passcode-pad" id="pad"></div>
  </div>

  <!-- Interception Modal -->
  <div id="interception" class="hidden">
    <div class="interception-card">
      <div class="int-icon">⏳</div>
      <div class="int-stats" id="int-stats"></div>
      <div class="int-msg" id="int-msg">等一等，你真的需要记录吗？</div>
      <div class="int-alt" id="int-alt"></div>
      <div class="int-btns">
        <button class="int-proceed" id="int-proceed-btn">继续记录</button>
        <button class="int-resist" id="int-resist-btn">✋ 我决定克制</button>
      </div>
    </div>
  </div>

  <div id="header"><div style="width:36px"></div><h1>Pulse</h1><button id="lock-btn">🔒</button></div>

  <!-- Risk Warning Bar -->
  <div id="risk-bar"></div>

  <div id="content">
    <!-- Home -->
    <div id="view-home" class="view active">
      <div id="timer-area">
        <div class="timer-ring">
          <svg viewBox="0 0 100 100"><circle class="bg" cx="50" cy="50" r="45"/><circle class="fg" id="timer-progress" cx="50" cy="50" r="45" stroke-dasharray="282.7" stroke-dashoffset="282.7"/></svg>
          <div class="timer-time"><div class="elapsed" id="timer-display">00:00</div><div class="unit" id="timer-state">就绪</div></div>
        </div>
        <button id="timer-btn">▶</button>
        <button id="cancel-btn">取消计时</button>
        <div style="margin-top:10px">
          <button class="btn btn-secondary" id="manual-entry-btn" style="width:auto;font-size:12px;padding:8px 16px;min-height:auto">手动输入时长</button>
        </div>
      </div>
      <div id="streak-bar" class="hidden"><span class="icon">🔥</span><span id="streak-text"></span></div>
      <div id="quick-stats"></div>
      <div class="section-title">📋 最近记录</div>
      <div id="recent-sessions"></div>
    </div>

    <!-- Record -->
    <div id="view-record" class="view">
      <div class="section-title">⏱ 记录本次</div>
      <div id="edit-indicator">✏️ 编辑记录</div>
      <div class="dur-display" id="record-dur">--:--</div>

<script>
// ═══════════════ Database ═══════════════
const DB_NAME='pulse_db',DB_VER=1;
let db;
function openDB(){return new Promise((resolve,reject)=>{const req=indexedDB.open(DB_NAME,DB_VER);req.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('sessions'))d.createObjectStore('sessions',{keyPath:'id',autoIncrement:true});if(!d.objectStoreNames.contains('checkins'))d.createObjectStore('checkins',{keyPath:'date'});if(!d.objectStoreNames.contains('settings'))d.createObjectStore('settings',{keyPath:'key'})};req.onsuccess=e=>{db=e.target.result;resolve(db)};req.onerror=e=>reject(e)})}
function dbPut(store,data){return new Promise(r=>{const t=db.transaction(store,'readwrite').objectStore(store);t.put(data);t.transaction.oncomplete=()=>r()})}
function dbGetAll(store){return new Promise(r=>{const t=db.transaction(store,'readonly').objectStore(store);t.getAll().onsuccess=e=>r(e.target.result)})}
function dbGet(store,key){return new Promise(r=>{const t=db.transaction(store,'readonly').objectStore(store);t.get(key).onsuccess=e=>r(e.target.result)})}
function dbDelete(store,key){return new Promise(r=>{const t=db.transaction(store,'readwrite').objectStore(store);t.delete(key);t.transaction.oncomplete=()=>r()})}

// ═══════════════ Helpers ═══════════════
function vibe(){navigator.vibrate?.(8)}

// ═══════════════ Settings ═══════════════
let passcode='0000',goalWeekly=7,goalMinGap=0,interceptionEnabled=true,riskWarnEnabled=false;
let nextRiskTimeout=null;
async function loadSettings(){
  const s=await dbGet('settings','passcode');if(s)passcode=s.value;
  const gw=await dbGet('settings','goalWeekly');if(gw)goalWeekly=gw.value;
  const gm=await dbGet('settings','goalMinGap');if(gm)goalMinGap=gm.value;
  const tr=await dbGet('settings','triggers');if(tr&&tr.value)triggers=tr.value;
  const ie=await dbGet('settings','interceptionEnabled');
  if(ie!==undefined)interceptionEnabled=ie.value!==false;else interceptionEnabled=true;
  const rw=await dbGet('settings','riskWarnEnabled');
  if(rw!==undefined)riskWarnEnabled=rw.value===true;else riskWarnEnabled=false;
  const iv=await dbGet('settings','interventions');
  if(iv&&iv.value)interventions=iv.value;
  document.getElementById('goal-weekly').textContent=goalWeekly;
  document.getElementById('goal-mingap').textContent=goalMinGap;
  document.getElementById('interception-enabled').checked=interceptionEnabled;
  document.getElementById('risk-warn-enabled').checked=riskWarnEnabled;
  renderTriggerChips();renderHistTriggerChips();renderInterventionList();renderTriggerManage();
  updateGoalWarnings();updateNotifPermBtn();
  if(riskWarnEnabled)scheduleRiskCheck();
}
async function setSetting(key,value){
  await dbPut('settings',{key,value});
  if(key==='passcode')passcode=value;
  else if(key==='goalWeekly')goalWeekly=value;
  else if(key==='goalMinGap')goalMinGap=value;
}
document.getElementById('interception-enabled').onchange=()=>{interceptionEnabled=document.getElementById('interception-enabled').checked;dbPut('settings',{key:'interceptionEnabled',value:interceptionEnabled})};
document.getElementById('risk-warn-enabled').onchange=async()=>{riskWarnEnabled=document.getElementById('risk-warn-enabled').checked;await dbPut('settings',{key:'riskWarnEnabled',value:riskWarnEnabled});if(riskWarnEnabled)scheduleRiskCheck()};

function updateNotifPermBtn(){
  const btn=document.getElementById('notif-perm-btn');
  if(!('Notification' in window)){btn.style.display='none';return}
  if(Notification.permission==='granted'){btn.style.display='none'}
  else{btn.style.display='inline-block';btn.textContent=Notification.permission==='denied'?'⚠ 通知权限已被拒绝':'🔔 开启浏览器通知'}
}
document.getElementById('notif-perm-btn').onclick=async()=>{
  if(!('Notification' in window)){toast('浏览器不支持通知');return}
  const perm=await Notification.requestPermission();
  if(perm==='granted'){toast('✅ 通知已开启');updateNotifPermBtn()}
  else toast('❌ 通知权限被拒绝');
  updateNotifPermBtn();
};

// ═══════════════ Lock ═══════════════
let passInput='',unlocked=false;
const dotsEl=document.getElementById('dots'),lockEl=document.getElementById('lock');
function buildPassPad(){
  const pad=document.getElementById('pad');
  ['1','2','3','4','5','6','7','8','9','','0','del'].forEach(k=>{
    const btn=document.createElement('div');
    btn.className='passcode-key'+(k==='del'?' del':'');
    btn.textContent=k==='del'?'⌫':k;
    if(k===''){btn.style.visibility='hidden';pad.appendChild(btn);return}
    btn.onclick=()=>{vibe();
      if(k==='del')passInput=passInput.slice(0,-1);
      else passInput+=k;
      if(passInput.length>4)passInput=passInput.slice(-4);
      updateDots();
      if(passInput.length===4){
        if(passInput===passcode)unlock();
        else{shakeDots();passInput='';updateDots()}
      }
    };
    pad.appendChild(btn);
  });
  for(let i=0;i<4;i++){const d=document.createElement('div');d.className='passcode-dot';dotsEl.appendChild(d)}
}
function updateDots(){dotsEl.querySelectorAll('.passcode-dot').forEach((d,i)=>d.classList.toggle('filled',i<passInput.length))}
function shakeDots(){dotsEl.querySelectorAll('.passcode-dot').forEach(d=>{d.classList.add('error');setTimeout(()=>d.classList.remove('error'),400)})}
function unlock(){lockEl.classList.add('hidden');unlocked=true}
function lock(){lockEl.classList.remove('hidden');unlocked=false;passInput='';updateDots()}
document.getElementById('lock-btn').onclick=()=>{vibe();lock()};

// ═══════════════ Timer ═══════════════
let timerRunning=false,timerStart=0,timerElapsed=0,timerInterval=null;
let pendingStartAction=null; // 'timer' | 'manual'
const timerDisplay=document.getElementById('timer-display'),timerState=document.getElementById('timer-state'),timerProgress=document.getElementById('timer-progress'),timerBtn=document.getElementById('timer-btn'),cancelBtn=document.getElementById('cancel-btn');

function updateTimerDisplay(){
  const s=Math.floor(timerElapsed/1000),m=Math.floor(s/60),sec=s%60;
  timerDisplay.textContent=String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
  const max=1800,progress=Math.min(s/max,1),circumference=282.7;
  timerProgress.style.strokeDashoffset=circumference*(1-progress);
}
function startTimer(){
  timerRunning=true;timerStart=Date.now()-timerElapsed;
  timerBtn.classList.add('running');timerBtn.textContent='⏸';
  timerState.textContent='计时中...';
  cancelBtn.classList.add('visible');
  timerInterval=setInterval(()=>{timerElapsed=Date.now()-timerStart;updateTimerDisplay()},500);
}
function cancelTimer(){
  timerRunning=false;clearInterval(timerInterval);
  timerElapsed=0;updateTimerDisplay();
  timerBtn.classList.remove('running');timerBtn.textContent='▶';
  cancelBtn.classList.remove('visible');
  timerState.textContent='已取消';
  setTimeout(()=>{timerState.textContent='就绪'},2000);
}
function stopTimer(){
  timerRunning=false;clearInterval(timerInterval);
  timerElapsed=Date.now()-timerStart;updateTimerDisplay();
  timerBtn.classList.remove('running');timerBtn.textContent='▶';
  cancelBtn.classList.remove('visible');
  timerState.textContent='已完成';
  navigateTo('record');updateRecordForm();
}
function doTimerStart(){
  pendingStartAction=null;
  timerElapsed=0;updateTimerDisplay();startTimer();
}
function doManualEntry(){
  pendingStartAction=null;
  timerElapsed=0;updateTimerDisplay();timerState.textContent='手动输入';
  navigateTo('record');updateRecordForm();
}
timerBtn.onclick=()=>{vibe();
  if(timerRunning){stopTimer();return}
  if(interceptionEnabled){pendingStartAction='timer';showInterception(doTimerStart);return}
  doTimerStart();
};
cancelBtn.onclick=()=>{vibe();if(timerRunning){if(confirm('取消本次计时？已记录的时间将丢弃。'))cancelTimer()}};
document.getElementById('manual-entry-btn').onclick=()=>{vibe();
  if(interceptionEnabled){pendingStartAction='manual';showInterception(doManualEntry);return}
  doManualEntry();
};

// ═══════════════ Interception ═══════════════
const defaultInterventions=[
  {trigger:'压力释放',message:'感到压力时，你其实不需要这个',alternatives:['做10个深呼吸','出门走5分钟','喝一杯水','听一首喜欢的歌']},
  {trigger:'无聊',message:'无聊是大脑在寻找刺激，试试这些',alternatives:['看一部纪录片','整理房间','给朋友发消息','学习一个新技能']},
  {trigger:'睡前',message:'睡眠比短暂的快感更重要',alternatives:['读10分钟书','做5分钟拉伸','写明天的计划','听白噪音']},
  {trigger:'刺激内容',message:'你看到的只是精心编排的表演',alternatives:['关闭所有相关APP','打开学习软件','做50个俯卧撑','洗个冷水脸']},
  {trigger:'早起',message:'早上清醒的大脑值得更好的利用',alternatives:['立即起床洗漱','出门散步10分钟','做一顿早餐','冥想5分钟']},
  {trigger:'运动后',message:'运动后的兴奋感可以转化为其他动力',alternatives:['继续运动10分钟','冲个澡','写运动日记','准备健康餐']},
  {trigger:'饮酒后',message:'酒精降低了你的判断力',alternatives:['喝一大杯水','马上睡觉','给信任的人打电话','吃点东西']},
  {trigger:'伴侣相关',message:'亲密关系中的情绪可以换一种方式表达',alternatives:['直接和伴侣交流你的感受','去做一件让你自豪的事']},
  {trigger:'自然冲动',message:'冲动像海浪，它会过去的',alternatives:['等待15分钟再做决定','写下你现在的感受','换个环境待着','做需要专注力的事']},
];
let interventions=[...defaultInterventions];

function getInterventionForTrigger(triggerName){
  return interventions.find(i=>i.trigger===triggerName)||null;
}
function getRandomIntervention(){
  if(interventions.length===0)return null;
  return interventions[Math.floor(Math.random()*interventions.length)];
}
async function showInterception(onProceed){
  const sessions=(await dbGetAll('sessions')).filter(s=>!s.hidden);
  sessions.sort((a,b)=>new Date(b.startTime)-new Date(a.startTime));
  const checkins=await dbGetAll('checkins');

  // Stats for message
  const now=new Date(),today=now.toISOString().slice(0,10);
  let daysSince=null,streak=0;
  if(sessions.length>0){
    const lastDate=new Date(sessions[0].startTime).toISOString().slice(0,10);
    daysSince=Math.floor((new Date(today)-new Date(lastDate))/86400000);
  }
  const checkinDates=new Set(checkins.map(c=>c.date));
  let d=new Date(today);if(!checkinDates.has(d.toISOString().slice(0,10)))d.setDate(d.getDate()-1);
  while(checkinDates.has(d.toISOString().slice(0,10))){streak++;d.setDate(d.getDate()-1)}

  let statsHtml='';
  if(daysSince!==null&&daysSince>0)statsHtml+=`距离上次记录已过去 <strong>${daysSince}</strong> 天 · `;
  if(streak>0)statsHtml+=`已连续打卡 <strong>${streak}</strong> 天`;
  else if(daysSince===null||daysSince===0)statsHtml+='这是你今天的第一次';

  document.getElementById('int-stats').innerHTML=statsHtml;

  // Random intervention message
  const intv=getRandomIntervention();
  document.getElementById('int-msg').textContent=intv?intv.message:'等一等，你真的需要记录吗？';
  if(intv&&intv.alternatives.length){
    document.getElementById('int-alt').innerHTML=`<div class="alt-label">💡 试试替代行为</div>${intv.alternatives.map(a=>`<li>${a}</li>`).join('')}`;
  }else{
    document.getElementById('int-alt').innerHTML='<div class="alt-label">💡 试试替代行为</div><li>深呼吸，给自己30秒</li><li>问自己：10分钟后我还想做这件事吗？</li>';
  }

  const interceptionEl=document.getElementById('interception');
  interceptionEl.classList.remove('hidden');

  document.getElementById('int-proceed-btn').onclick=()=>{vibe();interceptionEl.classList.add('hidden');onProceed()};
  document.getElementById('int-resist-btn').onclick=()=>{vibe();interceptionEl.classList.add('hidden');
    const alts=intv?intv.alternatives.join('、'):'深呼吸，转移注意力';
    toast(`👍 你战胜了一次冲动！试试：${alts.slice(0,30)}...`);
    // Log the resistance
    dbPut('settings',{key:'last_resist',value:now.toISOString()});
  };
}

// ═══════════════ Trigger Tips (Record page) ═══════════════
function updateTriggerTip(){
  const tipEl=document.getElementById('trigger-tip');
  const selected=[...document.querySelectorAll('#trigger-chips .chip.selected')].map(c=>c.dataset.trigger);
  if(selected.length===0){tipEl.classList.remove('visible');return}
  // Find first selected trigger that has an intervention
  let intv=null;
  for(const t of selected){intv=getInterventionForTrigger(t);if(intv)break}
  if(!intv){tipEl.classList.remove('visible');return}
  tipEl.innerHTML=`
    <div class="tt-label">💡 ${intv.trigger} · 应对方案</div>
    <div>${intv.message}</div>
    <div class="tt-alt"><ul>${intv.alternatives.map(a=>`<li>${a}</li>`).join('')}</ul></div>
    <button class="tt-resist" onclick="resistFromRecord()">✋ 我决定克制，不记录了</button>
  `;
  tipEl.classList.add('visible');
}
window.resistFromRecord=function(){
  const alts=document.querySelectorAll('#trigger-tip .tt-alt li');
  const altText=alts.length?alts[0].textContent:'转移注意力';
  toast(`👍 你战胜了一次冲动！试试：${altText}`);
  cancelEdit();navigateTo('home');
  dbPut('settings',{key:'last_resist',value:new Date().toISOString()});
};

// ═══════════════ Record ═══════════════
const defaultTriggers=['睡前','无聊','压力释放','自然冲动','刺激内容','伴侣相关','早起','运动后','饮酒后'];
let triggers=[...defaultTriggers],editingId=null;
function renderTriggerChips(){
  document.getElementById('trigger-chips').innerHTML=triggers.map(t=>`<div class="chip" data-trigger="${t}">${t}</div>`).join('');
}
document.getElementById('trigger-chips').onclick=e=>{if(e.target.classList.contains('chip')){e.target.classList.toggle('selected');updateTriggerTip()}};
document.getElementById('record-min').oninput=function(){const m=parseInt(this.value)||0;timerElapsed=m*60000;updateRecordForm()};
function updateRecordForm(){
  const s=Math.floor(timerElapsed/1000),m=Math.floor(s/60),sec=s%60;
  document.getElementById('record-dur').textContent=String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
  document.getElementById('record-min').value=m||'';
  const startEl=document.getElementById('record-start-time');
  if(editingId){startEl.textContent='编辑模式'}
  else if(timerStart>0&&timerRunning===false){const st=new Date(timerStart-timerElapsed);startEl.textContent=`开始 ${st.getHours().toString().padStart(2,'0')}:${st.getMinutes().toString().padStart(2,'0')}`}
  else if(timerRunning){const st=new Date(timerStart);startEl.textContent=`开始 ${st.getHours().toString().padStart(2,'0')}:${st.getMinutes().toString().padStart(2,'0')}（计时中）`}

function renderCalendar(sessions,checkins){

  const days=['日','一','二','三','四','五','六'];let html='<div class="cal-month-labels">';

function renderChart(sessions){
  const canvas=document.getElementById('chart');if(!canvas)return;
  const ctx=canvas.getContext('2d'),W=canvas.parentElement.clientWidth-32,dpr=window.devicePixelRatio||1;canvas.width=W*dpr;canvas.height=168*dpr;canvas.style.width=W+'px';canvas.style.height='168px';ctx.scale(dpr,dpr);
  if(sessions.length===0){ctx.fillStyle='#71787c';ctx.font='14px sans-serif';ctx.textAlign='center';ctx.fillText('暂无数据',W/2,84);return}
  const d0=new Date(sessions[0].startTime),dn=new Date(sessions[sessions.length-1].startTime),cur=new Date(d0);cur.setDate(cur.getDate()-cur.getDay());
  const end=new Date(dn);end.setDate(end.getDate()+6-end.getDay()),weekCounts=[];
  while(cur<=end){let count=0;for(let i=0;i<7;i++){const ds=new Date(cur);ds.setDate(ds.getDate()+i);count+=sessions.filter(s=>s.startTime.startsWith(ds.toISOString().slice(0,10))).length}weekCounts.push(count);cur.setDate(cur.getDate()+7)}
  const maxVal=Math.max(...weekCounts,goalWeekly),barW=Math.max(8,(W-weekCounts.length*4)/weekCounts.length-4),H=168;ctx.clearRect(0,0,W,H);
  if(goalWeekly>0){const goalY=H-20-(goalWeekly/maxVal*130);ctx.strokeStyle='#ba1a1a';ctx.setLineDash([4,4]);ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,goalY);ctx.lineTo(W,goalY);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#ba1a1a';ctx.font='10px sans-serif';ctx.fillText(`目标:${goalWeekly}`,4,goalY-4)}
  weekCounts.forEach((v,i)=>{const x=4+i*(barW+4),barH=v/maxVal*130,y=H-20-barH;ctx.fillStyle=v>goalWeekly?'#ba1a1a':'#2f6378';ctx.beginPath();ctx.roundRect(x,y,barW,barH,3);ctx.fill();if(i%4===0){ctx.fillStyle='#71787c';ctx.font='9px sans-serif';ctx.fillText((i+1),x,170)}});
}
function renderCorrelation(sessions,checkins){
  if(sessions.length<2||checkins.length<2){document.getElementById('correlation-grid').innerHTML='<div class="empty">需要更多数据</div>';return}
  const dims=checkinDims,results={};dims.forEach(d=>{results[d.key]={highFreq:[],lowFreq:[]}});
  const checkinMap=new Map(checkins.map(c=>[c.date,c]));
  sessions.forEach(s=>{const sDate=s.startTime.slice(0,10),nextDay=new Date(sDate);nextDay.setDate(nextDay.getDate()+1);const checkin=checkinMap.get(nextDay.toISOString().slice(0,10));if(!checkin)return;const threeDaysAgo=new Date(new Date(sDate));threeDaysAgo.setDate(threeDaysAgo.getDate()-2);const freq=sessions.filter(o=>{const oDate=o.startTime.slice(0,10);return oDate>=threeDaysAgo.toISOString().slice(0,10)&&oDate<=sDate}).length;dims.forEach(d=>{if(checkin[d.key]){if(freq>=2)results[d.key].highFreq.push(checkin[d.key]);else results[d.key].lowFreq.push(checkin[d.key])}})});
  let html='';dims.forEach(d=>{const r=results[d.key],hiAvg=r.highFreq.length?r.highFreq.reduce((a,b)=>a+b,0)/r.highFreq.length:0,loAvg=r.lowFreq.length?r.lowFreq.reduce((a,b)=>a+b,0)/r.lowFreq.length:0,diff=hiAvg-loAvg,color=diff>0.5?'#266864':diff<-0.5?'#ba1a1a':'#71787c',insight=diff>0.5?'高频时 ↑':diff<-0.5?'高频时 ↓':'影响不大';html+=`<div class="corr-card"><div class="title">${d.emoji} ${d.label}</div><div class="value" style="color:${color}">${diff>0?'+':''}${diff.toFixed(1)}</div><div class="insight" style="color:${color}">${insight}</div></div>`});
  document.getElementById('correlation-grid').innerHTML=html;

function renderInsights(sessions,checkins){
  if(sessions.length<2){document.getElementById('insights').innerHTML='<div class="empty">需要更多数据</div>';return}
  const dates=sessions.map(s=>new Date(s.startTime.slice(0,10)));dates.sort((a,b)=>a-b);
  const intervals=[];for(let i=1;i<dates.length;i++)intervals.push((dates[i]-dates[i-1])/86400000);
  const avgInterval=intervals.length?intervals.reduce((a,b)=>a+b,0)/intervals.length:0;
  const avgDuration=sessions.reduce((a,b)=>a+(b.duration||0),0)/sessions.length;
  const triggerCount={};sessions.forEach(s=>{(s.triggers||[]).forEach(t=>{triggerCount[t]=(triggerCount[t]||0)+1})});
  const topTriggers=Object.entries(triggerCount).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const now=new Date(),weekAgo=new Date(now);weekAgo.setDate(weekAgo.getDate()-6);

  let html=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="corr-card"><div class="title">平均间隔</div><div class="value">${avgInterval.toFixed(1)} 天</div></div><div class="corr-card"><div class="title">平均时长</div><div class="value">${Math.round(avgDuration)} 分钟</div></div><div class="corr-card"><div class="title">近7天</div><div class="value" style="color:${weekCount>goalWeekly?'#ba1a1a':'#2f6378'}">${weekCount} 次</div></div><div class="corr-card"><div class="title">总计</div><div class="value">${sessions.length} 次</div></div></div>`;
  if(topTriggers.length)html+=`<div style="margin-top:12px;font-size:13px;color:var(--text2)">常见触发：${topTriggers.map(([t,c])=>`${t}(${c}次)`).join(' · ')}</div>`;

// Risk hours computation
function computeRiskHours(sessions){
  if(sessions.length<5)return[];
  const hourCount=new Array(24).fill(0);
  sessions.forEach(s=>{const h=new Date(s.startTime).getHours();hourCount[h]++});
  const avg=hourCount.reduce((a,b)=>a+b,0)/24;
  const threshold=Math.max(avg*1.5,2);
  const riskHours=[];
  hourCount.forEach((c,h)=>{if(c>=threshold)riskHours.push(h)});
  return riskHours.sort((a,b)=>a-b);
}
function scheduleRiskCheck(){
  if(nextRiskTimeout){clearTimeout(nextRiskTimeout);nextRiskTimeout=null}
  if(!riskWarnEnabled)return;
  dbGetAll('sessions').then(sessions=>{
    const riskHours=computeRiskHours(sessions.filter(s=>!s.hidden));
    if(riskHours.length===0)return;
    const now=new Date(),currentHour=now.getHours(),currentMin=now.getMinutes();
    // Find next risk hour
    let nextH=null;
    for(const h of riskHours){if(h>currentHour||(h===currentHour&&currentMin<55)){nextH=h;break}}
    if(nextH===null&&riskHours.length>0)nextH=riskHours[0]; // wrap to tomorrow
    if(nextH===null)return;
    // Calculate ms until next risk hour
    let target=new Date(now);target.setHours(nextH,0,0,0);
    if(target<=now)target.setDate(target.getDate()+1);
    const delay=target-now;
    if(delay>86400000)return; // too far, skip
    nextRiskTimeout=setTimeout(()=>{
      showRiskWarning(riskHours);
      scheduleRiskCheck(); // reschedule after firing
    },delay);
    console.log(`Risk check scheduled: ${target.toLocaleTimeString()} (${Math.round(delay/60000)}min)`);
  });
}
function showRiskWarning(riskHours){
  const bar=document.getElementById('risk-bar');
  const now=new Date(),h=now.getHours();
  if(!riskHours.includes(h))return;
  bar.textContent=`⚠️ 这是你的高频时段（${riskHours.map(x=>x+'点').join('、')}），提高警惕！`;
  bar.classList.add('visible');
  setTimeout(()=>bar.classList.remove('visible'),300000); // 5min
  // Browser notification
  if('Notification' in window&&Notification.permission==='granted'){
    new Notification('Pulse · 高危时段提醒',{body:`现在是你的高频时段（${riskHours.map(x=>x+'点').join('、')}）。深呼吸，保持清醒。`,icon:'/pulse/icons/icon-192.png'});
  }
}

document.getElementById('reset-triggers-btn').onclick=async()=>{if(!confirm('恢复默认触发场景？'))return;triggers=[...defaultTriggers];await setSetting('triggers',[...triggers]);renderTriggerChips();renderHistTriggerChips();renderTriggerManage();toast('✅ 已恢复默认')};
async function updateGoalWarnings(){
  const sessions=(await dbGetAll('sessions')).filter(s=>!s.hidden),now=new Date(),weekAgo=new Date(now);weekAgo.setDate(weekAgo.getDate()-6);
  const weekCount=sessions.filter(s=>new Date(s.startTime)>=weekAgo).length;
  let warn='';if(weekCount>goalWeekly)warn=`⚠️ 本周已 ${weekCount} 次，超过目标 ${goalWeekly} 次`;
  document.getElementById('goal-warning').innerHTML=warn?`<div class="goal-warn">${warn}</div>`:'';
}
window.adjustGoal=async function(d){goalWeekly=Math.max(0,goalWeekly+d);document.getElementById('goal-weekly').textContent=goalWeekly;await setSetting('goalWeekly',goalWeekly);updateGoalWarnings();renderStats()};
window.adjustMinGap=async function(d){goalMinGap=Math.max(0,goalMinGap+d);document.getElementById('goal-mingap').textContent=goalMinGap;await setSetting('goalMinGap',goalMinGap)};
document.getElementById('set-passcode-btn').onclick=async()=>{const val=document.getElementById('new-passcode').value;if(!/^\d{4}$/.test(val)){toast('请输入4位数字密码');return};await setSetting('passcode',val);document.getElementById('new-passcode').value='';toast('✅ 密码已更新')};
document.getElementById('export-btn').onclick=async()=>{const sessions=await dbGetAll('sessions'),checkins=await dbGetAll('checkins');const data=JSON.stringify({sessions,checkins,exportedAt:new Date().toISOString()},null,2);const blob=new Blob([data],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='pulse_export_'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('✅ 已下载')};
window.deleteSession=async function(id){if(!confirm('确认删除这条记录？删除后不可恢复。'))return;await dbDelete('sessions',id);toast('🗑 已删除');renderHome();renderStats();renderHistory()};
window.deleteCheckin=async function(date){if(!confirm('确认删除 '+date+' 的打卡？'))return;await dbDelete('checkins',date);toast('🗑 已删除');renderCheckinHistory()};

document.getElementById('import-btn').onclick=()=>document.getElementById('import-file').click();
document.getElementById('import-file').onchange=async function(){
  const file=this.files[0];if(!file)return;
  try{const text=await file.text(),data=JSON.parse(text);if(!data.sessions||!data.checkins){toast('❌ 格式无效');return}
    const existing=await dbGetAll('sessions'),keys=new Set(existing.map(s=>s.startTime+'|'+s.duration+'|'+(s.triggers||[]).join(',')));
    let sA=0,cA=0;
    for(const s of data.sessions){const k=s.startTime+'|'+(s.duration||0)+'|'+(s.triggers||[]).join(',');if(keys.has(k))continue;if(s.hidden===undefined)s.hidden=false;await dbPut('sessions',s);keys.add(k);sA++}
    for(const c of data.checkins){await dbPut('checkins',c);cA++}
    toast(`✅ 导入：${sA}条记录, ${cA}条打卡`);this.value='';renderHome();renderStats();renderCheckinHistory();renderHistory();
  }catch(e){toast('❌ 文件读取失败：'+e.message);this.value=''}
};

// ═══════════════ Home ═══════════════
async function renderHome(){
  const sessions=(await dbGetAll('sessions')).filter(s=>!s.hidden);sessions.sort((a,b)=>new Date(b.startTime)-new Date(a.startTime));
  const checkins=await dbGetAll('checkins'),checkinDates=new Set(checkins.map(c=>c.date));
  const today=new Date();let streak=0;const d=new Date(today);
  if(!checkinDates.has(d.toISOString().slice(0,10)))d.setDate(d.getDate()-1);
  while(checkinDates.has(d.toISOString().slice(0,10))){streak++;d.setDate(d.getDate()-1)}
  const streakEl=document.getElementById('streak-bar'),streakTxt=document.getElementById('streak-text');
  if(streak>0){streakEl.classList.remove('hidden');streakTxt.textContent=`连续打卡 ${streak} 天`}else streakEl.classList.add('hidden');
  const now=new Date(),weekAgo=new Date(now);weekAgo.setDate(weekAgo.getDate()-6);
  const weekCount=sessions.filter(s=>new Date(s.startTime)>=weekAgo).length;
  const monthCount=sessions.filter(s=>{const d=new Date(s.startTime);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()}).length;
  const avgDur=sessions.length?Math.round(sessions.reduce((a,b)=>a+(b.duration||0),0)/sessions.length):0;
  document.getElementById('quick-stats').innerHTML=`<div class="qs-card"><div class="val">${weekCount}</div><div class="label">本周</div></div><div class="qs-card"><div class="val">${monthCount}</div><div class="label">本月</div></div><div class="qs-card"><div class="val">${avgDur}min</div><div class="label">平均时长</div></div>`;
  const recent=sessions.slice(0,5);let html='';
  recent.forEach(s=>{const d=new Date(s.startTime),dateStr=(d.getMonth()+1)+'月'+d.getDate()+'日',timeStr=d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');const endTime=new Date(d.getTime()+s.duration*60000),endStr=endTime.getHours().toString().padStart(2,'0')+':'+endTime.getMinutes().toString().padStart(2,'0'),triggers=(s.triggers||[]).join(' · ')||'未标注';html+=`<div class="session-item"><div class="si-left"><div class="si-date">${dateStr}</div><div class="si-info">${timeStr} → ${endStr} · ${s.duration}分钟</div><div style="font-size:12px;color:var(--text3)">${triggers}</div></div><button class="del-icon" onclick="deleteSession(${s.id})">✕</button></div>`});
  document.getElementById('recent-sessions').innerHTML=html||'<div class="empty">暂无记录，点击 ▶ 开始</div>';
  // Update risk bar
  if(riskWarnEnabled){
    const riskHours=computeRiskHours(sessions);
    const nowH=new Date().getHours();
    const bar=document.getElementById('risk-bar');
    if(riskHours.includes(nowH)){bar.textContent=`⚠️ 这是你的高频时段（${riskHours.map(x=>x+'点').join('、')}），提高警惕！`;bar.classList.add('visible')}
    else bar.classList.remove('visible');
  }
}

// ═══════════════ Navigation ═══════════════
function navigateTo(view){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const navItem=document.querySelector('[data-view="'+view+'"]');if(navItem)navItem.classList.add('active');
  if(view==='home')renderHome();
  else if(view==='stats')renderStats();
  else if(view==='checkin')renderCheckinHistory();
  else if(view==='history'){renderHistTriggerChips();renderHistory();if(!editingId)cancelEdit()}
  else if(view==='goals'){updateGoalWarnings();renderTriggerManage();renderInterventionList();updateNotifPermBtn()};
}
document.querySelectorAll('.nav-item').forEach(item=>{item.onclick=()=>{vibe();navigateTo(item.dataset.view)}});

// ═══════════════ Toast ═══════════════
let toastTimer;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2000)}

// ═══════════════ Init ═══════════════
async function init(){
  await openDB();await loadSettings();buildPassPad();
  if(passcode==='0000')document.getElementById('lock-info').textContent='🔑 默认密码：0000（可在设置中修改）';
  else document.getElementById('lock-info').style.display='none';
  renderHome();
  if(riskWarnEnabled)scheduleRiskCheck();
  let lastActivity=Date.now();
  ['click','touchstart','keydown','scroll'].forEach(e=>document.addEventListener(e,()=>lastActivity=Date.now(),{passive:true}));
  setInterval(()=>{if(unlocked&&Date.now()-lastActivity>300000)lock()},30000);
}
if('serviceWorker' in navigator)navigator.serviceWorker.register('/pulse/sw.js');
init();
</script>
